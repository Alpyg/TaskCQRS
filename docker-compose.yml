services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskcqrs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      TASKCQRS_DB: "Host=db;Port=5432;Database=taskcqrs;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy
